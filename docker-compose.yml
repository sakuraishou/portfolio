services:
  app:
    # Alpine (musl) では sharp のネイティブバイナリが合わず落ちることがあるため glibc 系を使う
    image: node:24-bookworm-slim
    stdin_open: true   # プロンプトに入力できるようにする
    tty: true
    ports:
      - '3000:3000'
    # node_modules は匿名ボリュームのため、壊れた依存が残ると `fast-copy/dist` 不足で Payload が 500 になる。
    # そのときは: docker compose down -v してボリュームを捨ててから再度起動する。
    volumes:
      - .:/app
      - /app/node_modules
      # `devsafe` は rm -rf .next を行うため、.next を volume にすると削除できず詰まる
    working_dir: /app
    # 大事な情報は .env ファイルから読み込むように戻します
    env_file:
      - .env
    # 今回のトラブル対策として DNS 設定は残しておくと安心です
    dns:
      - 8.8.8.8
    # 開発時は「別マシン/別CPUでも毎回最初に動く」ことを優先する。
    # - package-lock.json は OS/CPU の差で内容が揺れやすく、交互に作業すると sharp 等のネイティブ依存でコケやすい
    # - Turbopack + next/font/google も環境によって落ちることがある（まずは非turboで安定化）
    command: sh -c "npm cache clean --force && npx -y npm@11.12.1 install --include=optional --no-audit --no-fund --package-lock=false && npm run devsafe"

services:
  sync-media:
    image: alpine:3.20
    profiles: ['sync']
    working_dir: /work
    volumes:
      - .:/work
      - ${HOME}/.ssh:/root/.ssh:ro
    command:
      - /bin/sh
      - -lc
      - apk add --no-cache rsync openssh && rsync -avz -e "ssh -o IgnoreUnknown=UseKeychain -o StrictHostKeyChecking=accept-new" vps:/var/www/my-apps/portfolio/media/ /work/media/

  app:
    # Alpine (musl) では sharp のネイティブバイナリが合わず落ちることがあるため glibc 系を使う
    image: node:22-bookworm-slim
    stdin_open: true   # プロンプトに入力できるようにする
    tty: true
    ports:
      - '3000:3000'
    # node_modules は匿名ボリュームのため、壊れた依存が残ると `fast-copy/dist` 不足で Payload が 500 になる。
    # そのときは: docker compose down -v してボリュームを捨ててから再度起動する。
    volumes:
      - .:/app
      # Upload 実ファイルをホストへ永続化（DB の media レコードと実体の不一致を防ぐ）
      - ./media:/app/media
      - /app/node_modules
      # .next を匿名 volume へ分離して、ホストFS同期起因の壊れたキャッシュを回避
      - /app/.next
    working_dir: /app
    # 大事な情報は .env ファイルから読み込むように戻します
    env_file:
      - .env
    # 今回のトラブル対策として DNS 設定は残しておくと安心です
    dns:
      - 8.8.8.8
    # 既定は webpack の next dev（Turbopack は `npm run dev:turbo` で任意利用）
    command: sh -c "npm cache clean --force && npx -y npm@11.12.1 ci --include=optional --no-audit && (npm run dev || npm run devsafe)"

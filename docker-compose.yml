services:
  app:
    # Alpine (musl) では sharp のネイティブバイナリが合わず落ちることがあるため glibc 系を使う
    image: node:24-bookworm-slim
    stdin_open: true   # プロンプトに入力できるようにする
    tty: true
    ports:
      - '3000:3000'
    # node_modules は匿名ボリュームのため、壊れた依存が残ると `fast-copy/dist` 不足で Payload が 500 になる。
    # そのときは: docker compose down -v してボリュームを捨ててから再度起動する。
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next  # ビルドキャッシュをコンテナ内に隔離（Turbopack の ENOENT 対策）
    working_dir: /app
    # 大事な情報は .env ファイルから読み込むように戻します
    env_file:
      - .env
    # 今回のトラブル対策として DNS 設定は残しておくと安心です
    dns:
      - 8.8.8.8
    command: sh -c "npm cache clean --force && npx -y npm@11.12.1 ci --include=optional --no-audit && npm run dev"
